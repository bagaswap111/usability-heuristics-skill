name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check platform directories exist
        run: |
          for dir in web mobile desktop cli; do
            [ -f "$dir/SKILL.md" ] || { echo "Missing $dir/SKILL.md"; exit 1; }
          done
      - name: Check tool directories exist
        run: |
          for tool in claude-code cursor windsurf github-copilot aider continue codex-cli augment pearai cody; do
            for platform in web mobile desktop cli; do
              [ -d "tools/$tool/$platform" ] || { echo "Missing tools/$tool/$platform"; exit 1; }
            done
          done
